<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Tile Game 6x6</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background-color: black;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
h1 { margin: 10px 0; font-size: 24px; text-align: center; }
#gameArea {
  display: grid;
  grid-template-columns: repeat(6, 60px);
  grid-gap: 8px;
  margin-top: 20px;
}
.tile {
  width: 60px;
  height: 60px;
  background-color: #222;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}
.tile.active { background-color: limegreen; }
.tile.wrong { background-color: red; }
#score { font-size: 22px; margin-top: 20px; }
button { margin-top: 20px; padding: 8px 16px; font-size: 16px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

<h1>Bot Tile Game 6x6</h1>
<div id="gameArea"></div>
<div id="score">Score: 0</div>
<button id="startBtn">Start Game</button>

<script>
const gameArea = document.getElementById('gameArea');
const scoreEl = document.getElementById('score');
const startBtn = document.getElementById('startBtn');

let tiles = [];
let activeTile = null;
let score = 0;

function createGrid() {
  for (let i = 0; i < 36; i++) {
    const tile = document.createElement('div');
    tile.classList.add('tile');
    tile.dataset.index = i;
    tile.addEventListener('click', () => handleClick(tile));
    gameArea.appendChild(tile);
    tiles.push(tile);
  }
}

function botPickTile() {
  if(activeTile) activeTile.classList.remove('active');
  const index = Math.floor(Math.random() * tiles.length);
  activeTile = tiles[index];
  activeTile.classList.add('active');
}

function handleClick(tile) {
  if(tile === activeTile) {
    score++;
    scoreEl.textContent = "Score: " + score;
    botPickTile();
  } else {
    tile.classList.add('wrong');
    setTimeout(()=>tile.classList.remove('wrong'), 400);
    score = 0;
    scoreEl.textContent = "Score: " + score;
    botPickTile();
  }
}

startBtn.addEventListener('click', () => {
  score = 0;
