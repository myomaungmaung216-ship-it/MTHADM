<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Game</title>
<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background-color: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    color: white;
  }

  #gameArea {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-gap: 10px;
    margin-top: 20px;
  }

  .tile {
    width: 100px;
    height: 100px;
    background-color: #222;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    font-size: 24px;
    user-select: none;
  }

  .tile.active {
    background-color: limegreen;
  }

  #score {
    font-size: 24px;
    margin-top: 20px;
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Pattern Game</h1>
<div id="gameArea"></div>
<div id="score">Score: 0</div>
<button onclick="startGame()">Start Game</button>

<script>
const gameArea = document.getElementById('gameArea');
const scoreEl = document.getElementById('score');
let score = 0;
let activeTile = null;

// Create 3x3 grid
for (let i = 0; i < 9; i++) {
  const tile = document.createElement('div');
  tile.classList.add('tile');
  tile.addEventListener('click', () => {
    if(tile === activeTile){
      score++;
      scoreEl.textContent = "Score: " + score;
      activateRandomTile();
    } else {
      score = 0;
      scoreEl.textContent = "Score: " + score;
    }
  });
  gameArea.appendChild(tile);
}

// Activate a random tile
function activateRandomTile() {
  if(activeTile) activeTile.classList.remove('active');
  const tiles = document.querySelectorAll('.tile');
  const index = Math.floor(Math.random() * tiles.length);
  activeTile = tiles[index];
  activeTile.classList.add('active');
}

// Start game
function startGame() {
  score = 0;
  scoreEl.textContent = "Score: 0";
  activateRandomTile();
}
</script>

</body>
</html>
