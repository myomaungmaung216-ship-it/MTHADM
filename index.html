<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Memory Game</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background-color: black;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
h1 { margin: 10px 0; font-size: 20px; text-align: center; }
#gameArea {
  display: grid;
  grid-template-columns: repeat(6, 40px);
  grid-gap: 4px;
  margin-top: 20px;
}
.tile {
  width: 40px;
  height: 40px;
  background-color: #222;
  border-radius: 4px;
  cursor: pointer;
  transition: 0.2s;
}
.tile.flash { background-color: limegreen !important; }
.tile.wrong { background-color: red !important; }
#score { font-size: 18px; margin-top: 10px; }
button { margin-top: 10px; padding: 6px 12px; font-size: 14px; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>

<h1>Pattern Memory Game 6×6</h1>
<div id="gameArea"></div>
<div id="score">Score: 0</div>
<button id="startBtn">Start Game</button>

<script>
const gameArea = document.getElementById('gameArea');
const scoreEl = document.getElementById('score');
const startBtn = document.getElementById('startBtn');

let sequence = [];
let userSequence = [];
