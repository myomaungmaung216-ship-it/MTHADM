<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Memory Game</title>
    <style>
        body {
            background-color: #1a1a2e; /* Background Blue */
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-gap: 15px;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .tile {
            width: 70px;
            height: 70px;
            background-color: #0f3460;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tile.active {
            background-color: #e94560; /* လင်းတဲ့အရောင် */
            transform: scale(0.9);
        }

        .btn {
            margin-top: 25px;
            padding: 10px 25px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        
        #message { margin-top: 15px; height: 20px; color: #ff9d00; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Pattern Memory</h2>
        <p>အဆင့်: <span id="level">1</span></p>
    </div>

    <div class="grid" id="grid">
        <!-- အကွက် ၁၆ ကွက် -->
    </div>

    <div id="message"></div>
    <button class="btn" onclick="startGame()">ဂိမ်းစမယ်</button>

    <script>
        const grid = document.getElementById('grid');
        const levelText = document.getElementById('level');
        const message = document.getElementById('message');
        
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let isWaiting = false;

        // အကွက် ၁၆ ကွက် ဖန်တီးခြင်း
        for (let i = 0; i < 16; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.setAttribute('data-id', i);
            tile.onclick = () => handleTileClick(i);
            grid.appendChild(tile);
        }

        function startGame() {
            level = 1;
            sequence = [];
            nextRound();
        }

        function nextRound() {
            playerSequence = [];
            isWaiting = true;
            message.innerText = "မှတ်ထားပါ...";
            levelText.innerText = level;
            
            // Random အကွက်အသစ် ထည့်ခြင်း
            sequence.push(Math.floor(Math.random() * 16));
            showSequence();
        }

        function showSequence() {
            let i = 0;
            const interval = setInterval(() => {
                flashTile(sequence[i]);
                i++;
                if (i >= sequence.length) {
                    clearInterval(interval);
                    isWaiting = false;
                    message.innerText = "သင့်အလှည့်!";
                }
            }, 600);
        }

        function flashTile(id) {
            const tile = document.querySelector(`[data-id="${id}"]`);
            tile.classList.add('active');
            setTimeout(() => tile.classList.remove('active'), 400);
        }

        function handleTileClick(id) {
            if (isWaiting) return;

            flashTile(id);
            playerSequence.push(id);

            const currentIndex = playerSequence.length - 1;
            
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                message.innerText = "မှားသွားပြီ! ပြန်စပါ။";
                sequence = [];
                level = 1;
                return;
            }

            if (playerSequence.length === sequence.length) {
                isWaiting = true;
                message.innerText = "မှန်တယ်!";
                level++;
                setTimeout(nextRound, 1000);
            }
        }
    </script>
</body>
</html>
